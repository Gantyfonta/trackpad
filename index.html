<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // 1. You MUST initialize the app here so the website knows where to send data
    const firebaseConfig = {
        apiKey: "AIzaSyBHFMX973TNhYWCTdxyJAS91LUr9XEcVZs",
        authDomain: "checkboxes-ad47a.firebaseapp.com",
        databaseURL: "https://checkboxes-ad47a-default-rtdb.firebaseio.com",
        projectId: "checkboxes-ad47a",
        storageBucket: "checkboxes-ad47a.firebasestorage.app",
        messagingSenderId: "506407575408",
        appId: "1:506407575408:web:18815c22446499cdb979b5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const mouseRef = ref(db, 'remote_mouse');

    const trackpad = document.getElementById('trackpad');
    const coordDisplay = document.getElementById('coord-display');

    // 2. Movement Logic
    trackpad.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = trackpad.getBoundingClientRect();
        
        const x = (touch.clientX - rect.left) / rect.width;
        const y = (touch.clientY - rect.top) / rect.height;

        // Visual feedback on phone
        coordDisplay.innerText = `X: ${x.toFixed(2)} Y: ${y.toFixed(2)}`;

        // Send data to Firebase
        update(mouseRef, {
            x: Math.max(0, Math.min(1, x)),
            y: Math.max(0, Math.min(1, y)),
            lastUpdate: Date.now()
        });
    }, { passive: false });

    // 3. Click Logic
    const sendClick = () => {
        update(mouseRef, { click: true });
        setTimeout(() => update(mouseRef, { click: false }), 100);
    };

    trackpad.addEventListener('touchstart', sendClick);
    document.getElementById('clickBtn').addEventListener('click', sendClick);
</script>
