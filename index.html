<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remote Mouse Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.x.x/firebase-database-compat.js"></script>
</head>
<body class="bg-zinc-900 h-screen w-screen overflow-hidden flex flex-col items-center justify-center p-4 select-none">

    <h1 class="text-zinc-500 mb-4 font-mono text-sm uppercase tracking-widest">Touchpad Mode</h1>

    <div id="trackpad" class="w-full h-3/4 bg-zinc-800 border-2 border-zinc-700 rounded-3xl shadow-2xl active:border-cyan-500 transition-colors touch-none flex items-center justify-center">
        <p class="text-zinc-600 pointer-events-none">Slide to move • Tap to click</p>
    </div>

    <button id="clickBtn" class="mt-8 px-12 py-4 bg-cyan-600 text-white rounded-full font-bold active:scale-95 transition-transform">
        LEFT CLICK
    </button>

    <script src="app.js"></script>
</body>
</html>
